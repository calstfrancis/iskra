app-id: io.github.calstfrancis.Iskra
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
command: iskra

finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=home
  - --share=network
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.Flatpak
  - --talk-name=org.freedesktop.secrets
  - --socket=ssh-auth

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_TARGET_DIR: /app/iskra-cargo-target
    RUST_BACKTRACE: '1'

modules:
  # Module 1: compile all cargo dependencies.
  # Cache key is based only on Cargo.toml, Cargo.lock, and cargo-sources.json.
  # This module is skipped (cache hit) on dev builds that don't change dependencies.
  - name: iskra-deps
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/iskra-deps/cargo
        CARGO_NET_OFFLINE: 'true'
    sources:
      - type: file
        path: ../Cargo.toml
      - type: file
        path: ../Cargo.lock
      - cargo-sources.json
    build-commands:
      # Copy vendor sources to a stable /app/ path so Module 2 uses the same path
      # in cargo fingerprints (fingerprints are path-sensitive for vendor sources).
      - cp -r cargo/vendor /app/iskra-cargo-vendor
      - printf '[source.vendored-sources]\ndirectory = "/app/iskra-cargo-vendor"\n\n[source.crates-io]\nreplace-with = "vendored-sources"\n' > cargo/config
      # Stub main.rs so cargo compiles all deps but not the real app code
      - mkdir -p src
      - echo 'fn main() {}' > src/main.rs
      - cargo --offline build --release --manifest-path Cargo.toml
      # Remove stub iskra artifacts so Module 2 always recompiles from real source
      - rm -f /app/iskra-cargo-target/release/iskra
      - rm -f /app/iskra-cargo-target/release/iskra.d
      - rm -rf /app/iskra-cargo-target/release/.fingerprint/iskra-*
      - rm -rf /app/iskra-cargo-target/release/deps/iskra-*

  # Module 2: compile only the iskra crate, using pre-built deps from Module 1.
  # Cache key includes all source files, so it always misses on code changes —
  # but cargo only recompiles the iskra crate itself (deps are already built).
  - name: iskra
    buildsystem: simple
    build-options:
      env:
        CARGO_HOME: /run/build/iskra/cargo
        CARGO_NET_OFFLINE: 'true'
    sources:
      - type: git
        url: https://github.com/calstfrancis/iskra.git
        branch: main
      - type: file
        path: io.github.calstfrancis.Iskra.metainfo.xml
    build-commands:
      # Point cargo at the vendor dir and pre-built target from iskra-deps
      - mkdir -p cargo
      - printf '[source.vendored-sources]\ndirectory = "/app/iskra-cargo-vendor"\n\n[source.crates-io]\nreplace-with = "vendored-sources"\n' > cargo/config
      - cargo --offline build --release --manifest-path Cargo.toml
      - install -Dm755 /app/iskra-cargo-target/release/iskra /app/bin/iskra
      - strip /app/bin/iskra
      # Clean up build artifacts before finalising the module state
      - rm -rf /app/iskra-cargo-vendor /app/iskra-cargo-target
      - sed -i 's/^Icon=iskra/Icon=io.github.calstfrancis.Iskra/' packaging/io.github.calstfrancis.Iskra.desktop
      - install -Dm644 packaging/io.github.calstfrancis.Iskra.desktop /app/share/applications/io.github.calstfrancis.Iskra.desktop
      - install -Dm644 packaging/iskra.svg /app/share/icons/hicolor/scalable/apps/io.github.calstfrancis.Iskra.svg
      - install -Dm644 io.github.calstfrancis.Iskra.metainfo.xml /app/share/metainfo/io.github.calstfrancis.Iskra.metainfo.xml
